name: Telegram Bot Runner

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'How long to run the bot (in minutes, max 360)'
        required: true
        default: '60'

jobs:
  run-bot:
    name: Run Telegram Bot
    runs-on: ubuntu-latest
    timeout-minutes: 360 # GitHub Action limit

    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        persist-credentials: false

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@1482e35b71db3f08d0e74f1d97743d8376e19196 # stable

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libssl-dev pkg-config libsasl2-dev libldap2-dev

    - name: Rust Cache
      uses: Swatinem/rust-cache@23bdee3ae5713ccdc2a1d56f157cc501ebd6e255 # v2.7.7

    - name: Build nxc
      run: cargo build --release -p nxc

    - name: Run Telegram Bot
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      run: |
        echo "Starting NetExec-RS Telegram Bot..."
        # We use a timeout to ensure the job doesn't hang indefinitely 
        # (though GitHub will kill it after 6 hours anyway)
        timeout ${{ github.event.inputs.duration }}m ./target/release/nxc telegram || true
