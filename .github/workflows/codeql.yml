name: "CodeQL Advanced"

on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'CODE_OF_CONDUCT.md'
      - 'SECURITY.md'
      - '.env.example'
      - 'docs/**'
  pull_request:
    branches: [ "master" ]
    paths-ignore:
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'CODE_OF_CONDUCT.md'
      - 'SECURITY.md'
      - '.env.example'
      - 'docs/**'
  schedule:
    - cron: '44 11 * * 3'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: rust
          build-mode: none
        - language: actions
          build-mode: none

    steps:
    - name: Checkout repository
      uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4
      with:
        persist-credentials: false

    - name: Setup Rust Toolchain
      if: matrix.language == 'rust'
      uses: actions-rust-lang/setup-rust-toolchain@9399c7bb15d4c7d47b27263d024f0a4978346ba4 # v1
      with:
        components: clippy, rustfmt

    - name: Initialize CodeQL
      uses: github/codeql-action/init@597e12aa85c95194dbf8a83c0e3a649444a119bc # v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        config-file: ./.github/codeql-config.yml


    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@597e12aa85c95194dbf8a83c0e3a649444a119bc # v4
      with:
        category: "/language:${{matrix.language}}"
