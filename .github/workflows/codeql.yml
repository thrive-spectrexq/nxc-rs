name: "CodeQL Advanced"

on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'CODE_OF_CONDUCT.md'
      - 'SECURITY.md'
      - '.env.example'
      - 'docs/**'
  pull_request:
    branches: [ "master" ]
    paths-ignore:
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'CODE_OF_CONDUCT.md'
      - 'SECURITY.md'
      - '.env.example'
      - 'docs/**'
  schedule:
    - cron: '44 11 * * 3'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: rust
          build-mode: manual
        - language: actions
          build-mode: none

    steps:
    - name: Checkout repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        persist-credentials: false

    - name: Setup Rust Toolchain
      if: matrix.language == 'rust'
      uses: actions-rust-lang/setup-rust-toolchain@11df97af8e82a0bc5e1247da294e41114532e2ce # v1.10.1
      with:
        components: clippy, rustfmt
        cache-workdir: "."

    - name: Initialize CodeQL
      uses: github/codeql-action/init@df5fae9d3d3b79426f8ed89e0ee2540b014798e1 # v3.28.10
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        # Enable extended security and quality queries
        queries: security-extended,security-and-quality

    - name: Manual Build (Rust)
      if: matrix.language == 'rust' && matrix.build-mode == 'manual'
      run: |
        cargo build --all-targets --workspace

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@df5fae9d3d3b79426f8ed89e0ee2540b014798e1 # v3.28.10
      with:
        category: "/language:${{matrix.language}}"
