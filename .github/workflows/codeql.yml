name: "CodeQL Advanced"

on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'CODE_OF_CONDUCT.md'
      - 'SECURITY.md'
      - '.env.example'
      - 'docs/**'
  pull_request:
    branches: [ "master" ]
    paths-ignore:
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'CODE_OF_CONDUCT.md'
      - 'SECURITY.md'
      - '.env.example'
      - 'docs/**'
  schedule:
    - cron: '44 11 * * 3'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: rust
          build-mode: none
        - language: actions
          build-mode: none

    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        persist-credentials: false

    - name: Setup Rust Toolchain
      if: matrix.language == 'rust'
      uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1
      with:
        components: clippy, rustfmt

    - name: Initialize CodeQL
      uses: github/codeql-action/init@0b7b740d4cd9b44f80c907b666497564df09d1d9 # v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        config-file: ./.github/codeql-config.yml


    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@0b7b740d4cd9b44f80c907b666497564df09d1d9 # v4
      with:
        category: "/language:${{matrix.language}}"
