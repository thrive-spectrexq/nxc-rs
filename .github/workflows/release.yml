name: Publish Release

on:
  push:
    tags:
      - 'v*'  # Push events to matching v*, i.e. v1.0, v20.15.10
  workflow_dispatch:

jobs:
  build_release:
    name: Build release on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: nxc
            asset_name: nxc-linux-amd64
          - os: macos-latest
            artifact_name: nxc
            asset_name: nxc-macos-amd64
          - os: windows-latest
            artifact_name: nxc.exe
            asset_name: nxc-windows-amd64.exe

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        persist-credentials: false

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@1482e35b71db3f08d0e74f1d97743d8376e19196 # stable
      with:
        toolchain: stable
        
    - name: Rust Cache
      uses: Swatinem/rust-cache@23bdee3ae5713ccdc2a1d56f157cc501ebd6e255 # v2.7.7

    - name: Build Release Binary
      run: cargo build --release --workspace

    - name: Rename Binary
      shell: bash
      run: |
        mv target/release/${{ matrix.artifact_name }} target/release/${{ matrix.asset_name }}

    - name: Upload Binary to Release
      uses: softprops/action-gh-release@c95fe1489396fe8a2187f5baef5a513693e54b68 # v2.2.1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: target/release/${{ matrix.asset_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
