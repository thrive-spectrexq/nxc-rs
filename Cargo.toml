[workspace]
members = [
    "crates/netsage",
    "crates/agent",
    "crates/tui",
    "crates/tools",
    "crates/mcp",
    "crates/capture",
    "crates/session",
    "crates/config",
    "crates/auth",
    "crates/common",
    # NetExec-RS crates
    "nxc-rs/nxc-auth",
    "nxc-rs/nxc-protocols",
    "nxc-rs/nxc-modules",
    "nxc-rs/nxc-db",
    "nxc-rs/nxc-targets",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Antigravity"]
description = "AI-Powered Network Intelligence & Execution Tool — NetSage + NetExec-RS"

[workspace.dependencies]
ratatui = "0.28"
crossterm = "0.28"
tokio = { version = "1.0", features = ["full"] }
reqwest = { version = "0.12", features = ["json", "stream"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
pcap = "2.0"
rusqlite = { version = "0.31", features = ["bundled"] }
r2d2 = "0.8"
r2d2_sqlite = "0.24"
toml = "0.8"
clap = { version = "4.0", features = ["derive"] }
anyhow = "1.0"
thiserror = "1.0"
tracing = "0.1"
tracing-subscriber = "0.3"
syntect = "5.0"
tui-textarea = "0.6"
indicatif = "0.17"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
dotenvy = "0.15"
rand = "0.8"
etherparse = "0.14"
surge-ping = "0.8"
trust-dns-resolver = "0.23"
ssh2 = "0.9"
maxminddb = "0.24"
hostname = "0.4"
async-trait = "0.1"

# NetExec-RS dependencies
md4 = "0.10"
hmac = "0.12"
md-5 = "0.10"
rc4 = "0.1"
aes = "0.8"
des = "0.8"
csv = "1.3"
rayon = "1.10"
zeroize = { version = "1.8", features = ["derive"] }
