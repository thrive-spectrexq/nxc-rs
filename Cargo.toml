[workspace]
members = [
    "crates/netsage",
    "crates/netsage-agent",
    "crates/netsage-tui",
    "crates/netsage-tools",
    "crates/netsage-mcp",
    "crates/netsage-capture",
    "crates/netsage-session",
    "crates/netsage-config",
    "crates/netsage-auth",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Antigravity"]
description = "AI-Powered Network Intelligence Tool"

[workspace.dependencies]
ratatui = "0.28"
crossterm = "0.28"
tokio = { version = "1.0", features = ["full"] }
reqwest = { version = "0.12", features = ["json", "stream"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
pcap = "2.0"
rusqlite = { version = "0.31", features = ["bundled"] }
toml = "0.8"
clap = { version = "4.0", features = ["derive"] }
anyhow = "1.0"
thiserror = "1.0"
tracing = "0.1"
tracing-subscriber = "0.3"
syntect = "5.0"
tui-textarea = "0.6"
indicatif = "0.17"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
dotenvy = "0.15"
rand = "0.8"
etherparse = "0.14"
surge-ping = "0.8"
trust-dns-resolver = "0.23"
ssh2 = "0.9"
maxminddb = "0.24"
