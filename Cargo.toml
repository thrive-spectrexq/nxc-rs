[workspace]
members = [
    "nxc-rs/auth",
    "nxc-rs/protocols",
    "nxc-rs/modules",
    "nxc-rs/db",
    "nxc-rs/targets",
    "nxc-rs/nxc"
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Antigravity"]
description = "NetExec-RS — Network Execution Tool (Pure Rust Rewrite)"

[workspace.dependencies]
tokio = { version = "1.0", features = ["full", "time"] }
reqwest = { version = "0.12", features = ["json", "stream"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rusqlite = { version = "0.31", features = ["bundled"] }
r2d2 = "0.8"
r2d2_sqlite = "0.24"
toml = "0.8"
clap = { version = "4.0", features = ["derive"] }
anyhow = "1.0"
thiserror = "1.0"
tracing = "0.1"
tracing-subscriber = "0.3"
indicatif = "0.17"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
rand = "0.8"
ssh2 = "0.9"
hostname = "0.4"
async-trait = "0.1"
ldap3 = "0.11"

# NetExec-RS dependencies
md4 = "0.10"
hmac = "0.12"
md-5 = "0.10"
rc4 = "0.1"
aes = "0.8"
des = "0.8"
csv = "1.3"
zeroize = { version = "1.8", features = ["derive"] }
colored = "2.1"
