# cargo-deny configuration for nxc-rs
# Run: cargo deny check (install: cargo install cargo-deny)

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

# ─── Advisory Database ──────────────────────────────────────────
[advisories]
# Ignore specific advisories with documented reasons
ignore = []

# ─── License Compliance ─────────────────────────────────────────
[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8

[licenses.private]
ignore = false
registries = []

# ─── Crate Bans ─────────────────────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

# ─── Source Restrictions ─────────────────────────────────────────
[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
