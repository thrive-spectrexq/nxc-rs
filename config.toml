[core]
provider = "gemini" # Options: anthropic | openai | gemini
model = "gemini-2.5-pro"
approval_mode = "supervised"

[agent]
max_tokens = 4096
max_tool_iterations = 10
stream_timeout_secs = 30

[capture]
promiscuous = true
snaplen = 65535
max_packets_store = 1000

[session]
db_path = "session.db"
retain_days = 30

[tui]
theme = "dark"
show_timestamps = true
packet_viewer = true
topology_view = true
refresh_rate_ms = 100

[nxc]
threads = 256
timeout_secs = 30
jitter_ms = 0
lockout_threshold = 3
workspace = "default"
